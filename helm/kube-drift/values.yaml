# Default values for kube-drift.
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

# Target namespace override for the controller and its namespaced resources.
# Empty = use the release namespace (the `-n` flag). Set this only to pin a fixed
# namespace regardless of the release namespace.
namespace: ""
# Create the target namespace as part of the release. Leave false when installing
# with `helm install --create-namespace` (the documented path) to avoid an
# ownership conflict on the namespace object.
namespaceCreate: false

image:
  repository: somaz940/kube-drift
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []

serviceAccount:
  create: true
  # Empty = derived as <fullname>-controller-manager (release-scoped).
  name: ""
  annotations: {}

# RBAC (ClusterRole/Role and their bindings) creation.
rbac:
  create: true
  # Bind the controller ServiceAccount to the built-in `view` ClusterRole so it
  # can read arbitrary resource kinds for drift comparison. `view` is read-only
  # and excludes Secrets and RBAC objects by design. Off by default — the
  # controller ships with read access to `configmaps` only.
  viewRole:
    enabled: false
  # Extra read rules granted to the controller ServiceAccount for comparing
  # additional kinds not covered by `configmaps` or the `view` role above. When
  # non-empty, a dedicated ClusterRole (+ binding) is created. Use read verbs
  # only (get/list/watch) — the controller never writes to compared resources.
  # Each entry is a standard RBAC policy rule, e.g.:
  #   extraRules:
  #     - apiGroups: ["apps"]
  #       resources: ["deployments", "statefulsets"]
  #       verbs: ["get", "list", "watch"]
  extraRules: []

# Leader election for HA controller deployments.
leaderElection:
  enabled: true

# Controller manager metrics endpoint.
metrics:
  enabled: true
  # Serve metrics over HTTPS with authn/authz (recommended). Set false for HTTP.
  secure: true
  port: 8443
  service:
    type: ClusterIP

# Health / readiness probe endpoint.
health:
  port: 8081

# Extra args appended to the manager container command.
extraArgs: []

terminationGracePeriodSeconds: 10

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
