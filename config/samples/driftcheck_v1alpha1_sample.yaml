apiVersion: drift.somaz.io/v1alpha1
kind: DriftCheck
metadata:
  name: driftcheck-sample
  namespace: default
spec:
  # Desired-state manifests to compare against the live cluster.
  source:
    type: ConfigMap
    configMap:
      name: desired-manifests
      # namespace: default    # defaults to the DriftCheck's namespace
      # key: manifests.yaml    # omit to concatenate every key as a YAML stream
    # --- Or load the desired manifests from a Git repository instead: ---
    # type: Git
    # git:
    #   url: https://github.com/somaz94/kube-drift.git   # anonymous clone (public repos only)
    #   ref: main                                        # branch, tag, or commit; omit for the default branch
    #   path: config/samples                             # sub-directory holding the plain-YAML manifests
    # --- Or render a Helm chart from a Git repository in-process: ---
    # type: Helm
    # helm:
    #   git:
    #     url: https://github.com/example/charts.git
    #     ref: main
    #     path: charts/myapp                             # directory containing Chart.yaml
    #   releaseName: myapp                               # defaults to the DriftCheck name
    #   valuesFiles: [values-prod.yaml]                  # relative to the chart dir, merged in order
    #   values: { replicaCount: 3 }                      # inline overrides, applied last
    # --- Or build a Kustomize overlay from a Git repository in-process: ---
    # type: Kustomize
    # kustomize:
    #   git:
    #     url: https://github.com/example/config.git
    #     ref: main
    #     path: overlays/prod                            # directory containing kustomization.yaml
  # Optionally narrow which resources are compared.
  target:
    namespaces:
      - default
  # How often to re-evaluate drift.
  interval: 5m
  # Optionally notify when the drift state changes (detected or resolved).
  # A message is sent only when the set of drifted resources changes — not on
  # every re-check.
  # notify:
  #   webhooks:
  #     - type: Slack                     # {"text": ...} incoming-webhook payload
  #       urlSecretRef:                   # prefer a Secret for the webhook URL
  #         name: slack-webhook
  #         key: url
  #     - type: Generic                   # structured JSON body
  #       url: http://alertmanager-webhook.monitoring.svc/drift
